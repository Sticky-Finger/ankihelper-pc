name: Gitleaks Scan (incremental)

on:
  push:
    branches: ['**']         # 所有分支推送都触发
  pull_request:
    branches: ['master', 'main']
  workflow_dispatch:

jobs:
  gitleaks:
    name: Run Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0      # 必须拉取完整历史，否则无法计算日志范围

      - name: Determine Gitleaks log-opts
        id: log_opts
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "log_opts=--no-merges origin/${{ github.event.pull_request.base.ref }}..HEAD" >> $GITHUB_OUTPUT
          else
            echo "log_opts=--no-merges ${{ github.event.before }}..${{ github.event.after }}" >> $GITHUB_OUTPUT
          fi

      - name: Run Gitleaks (incremental)
        uses: gitleaks/gitleaks-action@v2
        with:
          # 对于 push，范围该次推送中包含的所有新提交
          # 对于 pull_request，范围是扫描 PR 中独有的提交
          args: --log-opts="${{ steps.log_opts.outputs.log_opts }}" --no-git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false
